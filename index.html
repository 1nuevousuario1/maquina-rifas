<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Máquina de Rifas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo">🎟️ Máquina de Rifas</div>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Mis Rifas</a>
    <a href="#">Cómo Funciona</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="upload">
  <label for="imagenProducto">Sube la imagen del producto:</label>
  <input type="file" id="imagenProducto" accept="image/*">
  <input type="text" id="nombreProducto" placeholder="Nombre del producto">
  <input type="number" id="precioNumero" placeholder="Precio por número">
  <button id="guardarRifa">Guardar Rifa</button>
  <div id="preview"></div>
</section>

<section class="config">
  <h2>Selecciona tipo de rifa</h2>
  <div class="botones">
    <button onclick="generarCuadricula(10)">Rifa de 10</button>
    <button onclick="generarCuadricula(20)">Rifa de 20</button>
    <button onclick="generarCuadricula(30)">Rifa de 30</button>
    <button onclick="generarCuadricula(40)">Rifa de 40</button>
    <button onclick="generarCuadricula(100)">Rifa de 100</button>
  </div>
</section>

<section id="cuadricula" class="grid"></section>

<footer>
  <button id="finalizar" onclick="finalizarRifa()">Finalizar Rifa</button>
</footer>

<!-- 🔥 Firebase SDK y lógica -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // ⚙️ Configuración de tu proyecto Firebase
  const firebaseConfig = {
    const firebaseConfig = {
  apiKey: "DEBES_CREARLA_EN_CREDENCIALES", // Ve a APIs y servicios > Credenciales
  authDomain: "project-3481698b-9510-4117-b7a.firebaseapp.com",
  projectId: "project-3481698b-9510-4117-b7a",
  storageBucket: "project-3481698b-9510-4117-b7a.firebasestorage.app",
  messagingSenderId: "492909881871",
  appId: "DEBES_REGISTRAR_UNA_APP_EN_FIREBASE" // Aparece al crear la app en la consola de Firebase
};

  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // 📤 Subir imagen y guardar rifa
  document.getElementById("guardarRifa").addEventListener("click", async () => {
    const file = document.getElementById("imagenProducto").files[0];
    const nombre = document.getElementById("nombreProducto").value;
    const precio = document.getElementById("precioNumero").value;

    if (!file || !nombre || !precio) {
      alert("Completa todos los campos.");
      return;
    }

    const storageRef = ref(storage, "productos/" + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "rifas"), {
      nombre: nombre,
      precio: parseFloat(precio),
      imagenURL: url,
      ocupados: []
    });

    alert("Rifa guardada correctamente.");
    mostrarRifas();
  });

  // 📥 Mostrar rifas guardadas
  async function mostrarRifas() {
    const contenedor = document.getElementById("cuadricula");
    contenedor.innerHTML = "";
    const querySnapshot = await getDocs(collection(db, "rifas"));
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      contenedor.innerHTML += `
        <div class="rifa">
          <h2>${data.nombre}</h2>
          <img src="${data.imagenURL}" alt="${data.nombre}">
          <p>Precio por número: $${data.precio}</p>
        </div>
      `;
    });
  }

  mostrarRifas();
</script>
</body>
</html>
