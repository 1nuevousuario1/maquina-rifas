<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎟️ Máquina de Rifas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- =========================
       HEADER
  ========================== -->
  <header>
    <h1>🎟️ Máquina de Rifas</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#rifas">Mis Rifas</a>
      <a href="#como-funciona">Cómo Funciona</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <!-- =========================
       PANEL ADMINISTRADOR
  ========================== -->
  <section id="adminPanel" style="display:none;">
    <h2>🎟️ Crear nueva rifa</h2>
    <div class="premio-contenido">
      <div class="imagen-premio">
        <div id="preview">
          <p style="color:#666;">No hay imagen seleccionada</p>
        </div>
      </div>

      <div class="detalles-premio">
        <p class="destacado">Premio Destacado</p>
        <input type="file" id="imagenProducto" accept="image/*">
        <input type="text" id="nombreProducto" placeholder="Nombre del producto">
        <input type="number" id="precioNumero" placeholder="Precio por número">
        <input type="number" id="totalBoletos" placeholder="Cantidad total de boletos">
        <input type="number" id="valorPremio" placeholder="Valor comercial del premio">
        <textarea id="descripcionPremio" placeholder="Describe el premio"></textarea>
        <button type="button" id="guardarRifa">🎟️ Guardar Rifa</button>
      </div>
    </div>
  </section>

  <!-- =========================
       PANEL USUARIO
  ========================== -->
  <section id="userPanel">
    <h2>🎲 Rifas disponibles</h2>
    <div id="rifas"></div>
  </section>

  <!-- =========================
       FIREBASE SDK
  ========================== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- =========================
       SCRIPT PRINCIPAL
  ========================== -->
  <script src="script.js"></script>

  <!-- =========================
       CONTROL DE ROLES
  ========================== -->
  <script>
    // Cambia a true para comerciantes (administrador)
    const esAdmin = false;

    if (esAdmin) {
      document.getElementById("adminPanel").style.display = "block";
      document.getElementById("userPanel").style.display = "none";
    } else {
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("userPanel").style.display = "block";
    }
  </script>
</body>
</html>
