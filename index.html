<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎟️ Máquina de Rifas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->

  <header>
    <h1>🎟️ Máquina de Rifas</h1>

    <nav>
      <a href="#">Inicio</a>
      <a href="#">Mis Rifas</a>
      <a href="#">Cómo Funciona</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <!-- =========================
       PREMIO
  ========================== -->

  <main>

    <section class="premio">

      <h2>Premio Actual</h2>

      <div class="premio-contenido">

        <!-- Vista previa -->

        <div class="imagen-premio">

          <div id="preview">

            <p style="color:#666;">
              No hay imagen seleccionada
            </p>

          </div>

        </div>

        <!-- Datos premio -->

        <div class="detalles-premio">

          <p class="destacado">
            Premio Destacado
          </p>

          <!-- Imagen -->

          <input
            type="file"
            id="imagenProducto"
            accept="image/*"
          >

          <!-- Nombre -->

          <input
            type="text"
            id="nombreProducto"
            placeholder="Nombre del producto"
          >

          <!-- Precio -->

          <input
            type="number"
            id="precioNumero"
            placeholder="Precio por número"
          >

          <!-- Guardar -->

          <button id="guardarRifa">
            Guardar Rifa
          </button>

        </div>

      </div>

    </section>

  </main>

  <!-- =========================
       CONFIGURACIÓN RIFA
  ========================== -->

  <section class="config">

    <h2>
      Elige tu número para participar
    </h2>

    <div class="botones">

      <button onclick="generarCuadricula(10)">
        Rifa de 10
      </button>

      <button onclick="generarCuadricula(20)">
        Rifa de 20
      </button>

      <button onclick="generarCuadricula(30)">
        Rifa de 30
      </button>

      <button onclick="generarCuadricula(50)">
        Rifa de 50
      </button>

      <button onclick="generarCuadricula(100)">
        Rifa de 100
      </button>

    </div>

    <!-- Cuadrícula -->

    <section id="cuadricula" class="grid"></section>

    <!-- Finalizar -->

    <button id="finalizar" onclick="finalizarRifa()">
      Confirmar Números
    </button>

  </section>

  <!-- =========================
       FIREBASE
  ========================== -->

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- =========================
       SCRIPT PRINCIPAL
  ========================== -->

  <script src="script.js"></script>

</body>
</html>
